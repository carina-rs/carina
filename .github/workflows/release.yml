name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-aarch64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin carina --bin carina-lsp
          else
            cargo build --release --target ${{ matrix.target }} --bin carina --bin carina-lsp
          fi

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE_NAME="carina-${VERSION}-${{ matrix.artifact }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp target/${{ matrix.target }}/release/carina "${ARCHIVE_NAME}/"
          cp target/${{ matrix.target }}/release/carina-lsp "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          else
            sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            carina-*.tar.gz
            carina-*.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
            artifacts/checksums-sha256.txt

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          MACOS_ARM_SHA256=$(grep "macos-aarch64" artifacts/*.sha256 | awk '{print $1}')
          MACOS_X86_SHA256=$(grep "macos-x86_64" artifacts/*.sha256 | awk '{print $1}')
          LINUX_ARM_SHA256=$(grep "linux-aarch64" artifacts/*.sha256 | awk '{print $1}')
          LINUX_X86_SHA256=$(grep "linux-x86_64" artifacts/*.sha256 | awk '{print $1}')

          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{MACOS_ARM_SHA256}}/${MACOS_ARM_SHA256}/g" \
            -e "s/{{MACOS_X86_SHA256}}/${MACOS_X86_SHA256}/g" \
            -e "s/{{LINUX_ARM_SHA256}}/${LINUX_ARM_SHA256}/g" \
            -e "s/{{LINUX_X86_SHA256}}/${LINUX_X86_SHA256}/g" \
            packaging/homebrew/carina.rb.template > carina.rb

      - name: Push to Homebrew tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: carina.rb
          destination_repo: carina-rs/homebrew-tap
          destination_folder: Formula
          destination_branch: main
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "Update carina to ${{ github.ref_name }}"

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order, with --no-verify to skip build
          # (already verified in the build job)
          cargo publish -p carina-core --no-verify || true
          sleep 30  # Wait for crates.io index update
          cargo publish -p carina-aws-types --no-verify || true
          sleep 30
          cargo publish -p carina-state --no-verify || true
          sleep 30
          cargo publish -p carina-tui --no-verify || true
          sleep 30
          cargo publish -p carina-lsp --no-verify || true
          sleep 30
          cargo publish -p carina-cli --no-verify || true
