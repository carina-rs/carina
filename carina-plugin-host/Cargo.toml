[package]
name = "carina-plugin-host"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
doctest = false

[dependencies]
carina-core = { path = "../carina-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
wasmtime = { version = "29", features = ["component-model"] }
wasmtime-wasi = "29"
wasmtime-wasi-http = "29"
tokio = { version = "1", features = ["rt"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tempfile = "3"
