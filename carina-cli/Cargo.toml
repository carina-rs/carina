[package]
name = "carina-cli"
version = "0.1.0"
edition = "2024"
license = "MIT"

[[bin]]
name = "carina"
path = "src/main.rs"

[dependencies]
carina-core = { path = "../carina-core" }
carina-provider-aws = { path = "../carina-provider-aws" }
carina-provider-awscc = { path = "../carina-provider-awscc" }
carina-provider-mock = { path = "../carina-provider-mock" }
carina-state = { path = "../carina-state" }
carina-tui = { path = "../carina-tui" }
aws-config = "1"
aws-sdk-kms = "1"
aws-sdk-s3 = "1"
base64 = "0.22"
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
clap_complete = { version = "4", features = ["unstable-dynamic"] }
colored = "3"
indicatif = "0.17"
env_logger = "0.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
similar = "2"
thiserror = "2"
futures = "0.3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[dev-dependencies]
async-trait = "0.1"
insta = "1"
regex-lite = "0.1"
